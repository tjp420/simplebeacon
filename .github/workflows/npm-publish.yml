name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      otp:
        description: '6-digit npm 2FA code (only if NPM_TOKEN lacks bypass-2fa)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install and test
        run: |
          npm test
          npm run pack:check
          node bin/simplebeacon-mcp.js --smoke-test

      - name: Publish (granular token with publish + bypass 2fa)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_OTP: ${{ inputs.otp }}
        run: npm publish --access public
